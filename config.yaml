# Конфигурация нагрузочного тестирования

# Параметры теста
test:
  # Базовый URL для тестирования
  url: "https://httpbin.org"
  
  # Количество виртуальных пользователей
  vus: 5
  
  # Длительность теста (формат: "30s", "1m", "5m" и т.д.)
  duration: "60s"
  
  # Ступенчатые стадии нагрузки (опционально, перезаписывает duration если заданы)
  stages:
    - duration: "10s"
      target: 5
    - duration: "50s"
      target: 5
    - duration: "10s"
      target: 0

# Результаты
results:
  # Базовая директория для результатов
  base_dir: "results"
  
  # Сохранять историю запусков
  keep_history: true
  
  # Генерировать CSV-отчёт (детальные данные по каждому запросу)
  # Установите false для экономии места — summary JSON содержит агрегированные метрики
  # CSV-файлы могут занимать сотни мегабайт для длительных тестов
  # ВНИМАНИЕ: При отключении сохраняются только агрегированные данные, без данных по каждому запросу
  generate_csv: false
