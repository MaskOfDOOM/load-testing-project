# Конфигурация маппинга StatsD для метрик k6
# k6 отправляет метрики с префиксом "k6." — statsd-exporter автоматически определяет тип (counter/gauge/timer)
# Timer без явного маппинга превращается в summary; с mapping + observer_type — в histogram

mappings:
  # --- Счётчики ---
  - match: "k6.http_reqs"
    name: "k6_http_reqs_total"
    type: COUNTER

  - match: "k6.http_req_failed"
    name: "k6_http_req_failed_total"
    type: COUNTER

  - match: "k6.iterations"
    name: "k6_iterations_total"
    type: COUNTER

  - match: "k6.data_received"
    name: "k6_data_received_total"
    type: COUNTER

  - match: "k6.data_sent"
    name: "k6_data_sent_total"
    type: COUNTER

  # --- Гейджи ---
  - match: "k6.vus"
    name: "k6_vus"

  - match: "k6.vus_max"
    name: "k6_vus_max"

  # --- Гистограммы (метрики времени) ---
  - match: "k6.http_req_duration"
    name: "k6_http_req_duration_seconds"
    observer_type: histogram

  - match: "k6.http_req_receiving"
    name: "k6_http_req_receiving_seconds"
    observer_type: histogram

  - match: "k6.http_req_waiting"
    name: "k6_http_req_waiting_seconds"
    observer_type: histogram

  - match: "k6.http_req_connecting"
    name: "k6_http_req_connecting_seconds"
    observer_type: histogram

  - match: "k6.http_req_sending"
    name: "k6_http_req_sending_seconds"
    observer_type: histogram

  - match: "k6.http_req_blocked"
    name: "k6_http_req_blocked_seconds"
    observer_type: histogram

  - match: "k6.http_req_tls_handshaking"
    name: "k6_http_req_tls_handshaking_seconds"
    observer_type: histogram

  - match: "k6.iteration_duration"
    name: "k6_iteration_duration_seconds"
    observer_type: histogram

  - match: "k6.response_time"
    name: "k6_response_time_seconds"
    observer_type: histogram
