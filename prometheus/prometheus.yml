global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'load-testing'
    replica: '0'

scrape_configs:
  # Сам Prometheus для мониторинга
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # StatsD Exporter — принимает метрики от k6 и отдаёт их Prometheus
  - job_name: 'statsd-exporter'
    static_configs:
      - targets: ['statsd-exporter:9102']
    scrape_interval: 5s
    metrics_path: '/metrics'
