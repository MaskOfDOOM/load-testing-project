global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'load-testing'
    replica: '0'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # StatsD Exporter - receives metrics from k6 and exposes them for Prometheus
  - job_name: 'statsd-exporter'
    static_configs:
      - targets: ['statsd-exporter:9102']
    scrape_interval: 5s
    metrics_path: '/metrics'
