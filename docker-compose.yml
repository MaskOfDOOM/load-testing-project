services:
  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: load-testing-statsd-exporter
    restart: unless-stopped
    ports:
      - "9125:9125"  # StatsD receiver
      - "9102:9102"  # Metrics endpoint for Prometheus
    command:
      - '--statsd.mapping-config=/etc/statsd/mapping.yml'
    volumes:
      - ./prometheus/statsd-mapping.yml:/etc/statsd/mapping.yml:ro
    networks:
      - load-testing-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9102/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  prometheus:
    image: prom/prometheus:latest
    container_name: load-testing-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - load-testing-network
    depends_on:
      - statsd-exporter
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: load-testing-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    networks:
      - load-testing-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  k6:
    build:
      context: .
      dockerfile: Dockerfile.k6
    container_name: load-testing-k6
    restart: unless-stopped
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
      - ./config.yaml:/config.yaml:ro
    networks:
      - load-testing-network
    depends_on:
      - statsd-exporter
    entrypoint: ["/bin/sh"]
    command: ["-c", "tail -f /dev/null"]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep k6 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 1
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  load-testing-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
