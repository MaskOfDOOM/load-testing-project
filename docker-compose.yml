services:
  influxdb:
    image: influxdb:2.7
    container_name: load-testing-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=k6
      - DOCKER_INFLUXDB_INIT_BUCKET=k6
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=k6-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - load-testing-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: load-testing-statsd-exporter
    ports:
      - "9125:9125"  # StatsD receiver
      - "9102:9102"  # Metrics endpoint for Prometheus
    command:
      - '--statsd.mapping-config=/etc/statsd/mapping.yml'
    volumes:
      - ./prometheus/statsd-mapping.yml:/etc/statsd/mapping.yml:ro
    networks:
      - load-testing-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9102/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: load-testing-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - load-testing-network
    depends_on:
      - statsd-exporter
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: load-testing-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - load-testing-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  k6:
    build:
      context: .
      dockerfile: Dockerfile.k6
    container_name: load-testing-k6
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
      - ./scripts:/scripts-run:ro
      - ./config.yaml:/config.yaml:ro
    networks:
      - load-testing-network
    depends_on:
      - statsd-exporter
    entrypoint: ["/bin/sh"]
    command: ["-c", "tail -f /dev/null"]
    stdin_open: true
    tty: true

networks:
  load-testing-network:
    driver: bridge

volumes:
  influxdb-data:
  influxdb-config:
  prometheus-data:
  grafana-data:
